<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" fill="#14160e"/>

  <!-- Eye outline -->
  <path d="M50 22 C20 22 6 50 6 50 C6 50 20 78 50 78 C80 78 94 50 94 50 C94 50 80 22 50 22 Z"
        fill="none" stroke="#e9ece0" stroke-width="4" stroke-linejoin="round"/>

  <!-- Globe circle -->
  <circle cx="50" cy="50" r="20" fill="none" stroke="#e9ece0" stroke-width="2.5"/>

  <!-- Globe vertical meridian -->
  <ellipse cx="50" cy="50" rx="9" ry="20" fill="none" stroke="#e9ece0" stroke-width="2"/>

  <!-- Globe horizontal bands -->
  <ellipse cx="50" cy="50" rx="20" ry="8" fill="none" stroke="#e9ece0" stroke-width="2"/>

  <!-- Globe cross lines -->
  <line x1="30" y1="50" x2="70" y2="50" stroke="#e9ece0" stroke-width="2"/>
  <line x1="50" y1="30" x2="50" y2="70" stroke="#e9ece0" stroke-width="2"/>
</svg>
